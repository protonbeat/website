<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About | PROTON BEAT</title>
  <style>
    :root {
      --bg: #050505;
      --fg: #f2f2f2;
      --muted: #9a9a9a;
      --line: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 32px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.06), transparent 28%),
        var(--bg);
      color: var(--fg);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    main {
      width: min(760px, 100%);
      padding: 56px 32px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .label {
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin-top: 18px;
      font-size: clamp(2.4rem, 8vw, 4.8rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    p {
      margin-top: 24px;
      max-width: 32rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.9;
    }

    a {
      display: inline-block;
      margin-top: 40px;
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="label">proton beat</div>
    <h1>About</h1>
    <p>
      We are a group of independent game developers building a strategy simulation game.
      We care about systems, choices, and chain reactions, and we hope to create a world worth exploring again and again through restrained design.
    </p>
    <a href="./index.html">Back Home</a>
  </main>
</body>
</html>
